---
# Keep MegaLinter focused on checks that are useful across these Python repos
# before strict typing, spelling, and security-scan baselines are established.
ENABLE_LINTERS:
  - ACTION_ACTIONLINT
  - COPYPASTE_JSCPD
  - MARKDOWN_MARKDOWNLINT
  - PYTHON_RUFF
  - REPOSITORY_GIT_DIFF
  - YAML_PRETTIER
  - YAML_YAMLLINT
  - YAML_V8R

# Scope PR linting to changed files so unrelated legacy duplicate-code
# baselines do not block feature branches.
VALIDATE_ALL_CODEBASE: false
PRINT_ALPACA: false
SHOW_ELAPSED_TIME: true
FLAVOR_SUGGESTIONS: false
PYTHON_RUFF_CONFIG_FILE: pyproject.toml
