---
name: Nightly CPU Evidence

on: # yamllint disable-line rule:truthy
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
    inputs:
      cache_version:
        description: Bump this to invalidate reduced real-scene caches.
        required: true
        type: string
        default: v1

permissions:
  contents: read

concurrency:
  group: nightly-cpu-evidence-${{ github.ref }}
  cancel-in-progress: false

jobs:
  synthetic-quick:
    name: Synthetic quick evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      EXPERIMENT_NAME: nightly_synthetic_quick
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Run synthetic quick preset
        run: |
          python -m gpis_splatting.cli.run_evaluation \
            --preset synthetic_quick \
            --output-root nightly_runs \
            --experiment-name "${EXPERIMENT_NAME}" \
            --benchmark-target benchmarks/mipnerf360_sparse_12view.json

      - name: Validate synthetic status
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          status_path = Path("nightly_runs") / "nightly_synthetic_quick" / "evaluation_status.json"
          status = json.loads(status_path.read_text(encoding="utf-8"))
          if not status.get("passed", False):
              failed = [check.get("check", "<unknown>") for check in status.get("checks", []) if not check.get("passed", False)]
              raise SystemExit(f"Synthetic quick checks failed: {failed}")
          PY

      - name: Publish synthetic summary
        if: always()
        run: |
          REPORT="nightly_runs/${EXPERIMENT_NAME}/evaluation_report.md"
          if [ -f "${REPORT}" ]; then
            cat "${REPORT}" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload synthetic artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-synthetic-quick
          path: |
            nightly_runs/${{ env.EXPERIMENT_NAME }}/ablation_metrics.csv
            nightly_runs/${{ env.EXPERIMENT_NAME }}/evaluation_checks.csv
            nightly_runs/${{ env.EXPERIMENT_NAME }}/evaluation_config.json
            nightly_runs/${{ env.EXPERIMENT_NAME }}/evaluation_report.md
            nightly_runs/${{ env.EXPERIMENT_NAME }}/evaluation_status.json
            nightly_runs/${{ env.EXPERIMENT_NAME }}/summary/**

  real-poster-smoke:
    name: Reduced real-scene poster smoke
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      SCENE: nightly_poster8_smoke
      DOWNLOAD_ROOT: real_scenes/_downloads
      CACHE_VERSION: ${{ inputs.cache_version || 'v1' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Restore reduced poster dataset cache
        uses: actions/cache@v4
        with:
          path: real_scenes/_downloads
          key: real-poster-${{ runner.os }}-scale8-images16-${{ env.CACHE_VERSION }}

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Run reduced real-scene evaluation
        run: |
          python -m gpis_splatting.cli.run_real_evaluation \
            --scene "${SCENE}" \
            --prepared-root real_scenes \
            --download-root "${DOWNLOAD_ROOT}" \
            --dataset nerfstudio_poster \
            --image-scale 8 \
            --max-download-images 16 \
            --train-view-count 4 \
            --max-points 300 \
            --max-train-points 200 \
            --seed 7 \
            --lengthscale 0.35 \
            --noise-std 0.06 \
            --splat-sigmas 0.025 \
            --epsilons 0.16 \
            --gate-floors 0.0 \
            --split test \
            --max-frames 1 \
            --require-all false \
            --min-sigma-px 0.8

      - name: Validate real-smoke artifacts
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          scene_dir = Path("real_scenes") / "nightly_poster8_smoke"
          status_path = scene_dir / "evaluations" / "real_evaluation_status.json"
          comparison_path = scene_dir / "evaluations" / "real_evaluation_comparison.csv"
          report_path = scene_dir / "evaluations" / "real_evaluation_report.md"
          for path in (status_path, comparison_path, report_path):
              if not path.is_file():
                  raise SystemExit(f"Missing real-smoke artifact: {path}")
          status = json.loads(status_path.read_text(encoding="utf-8"))
          if int(status.get("row_count", 0)) < 2:
              raise SystemExit(f"Expected at least plain and GPIS rows, got status={status}")
          PY

      - name: Publish real-smoke summary
        if: always()
        run: |
          REPORT="real_scenes/${SCENE}/evaluations/real_evaluation_report.md"
          if [ -f "${REPORT}" ]; then
            cat "${REPORT}" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload real-smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-real-poster-smoke
          path: |
            real_scenes/${{ env.SCENE }}/*_bootstrap_report.json
            real_scenes/${{ env.SCENE }}/*_fit_report.json
            real_scenes/${{ env.SCENE }}/real_scene.json
            real_scenes/${{ env.SCENE }}/cameras.json
            real_scenes/${{ env.SCENE }}/splits.json
            real_scenes/${{ env.SCENE }}/validation.json
            real_scenes/${{ env.SCENE }}/evaluations/**/*.csv
            real_scenes/${{ env.SCENE }}/evaluations/**/*.json
            real_scenes/${{ env.SCENE }}/evaluations/**/*.md
            real_scenes/${{ env.SCENE }}/renders/**/real_render_report.json

  backend-smoke:
    name: GPIS backend benchmark smoke
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      OUTPUT_DIR: nightly_backend_benchmark
      BENCHMARK_NAME: backend_smoke
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Run focused backend tests
        run: python -m pytest tests/test_gpis_backends.py tests/test_backend_benchmark.py -q

      - name: Run backend benchmark smoke
        run: |
          python -m gpis_splatting.cli.benchmark_gpis_backends \
            --output-dir "${OUTPUT_DIR}" \
            --benchmark-name "${BENCHMARK_NAME}" \
            --shape sphere \
            --n-train 384 \
            --n-query 256 \
            --num-neighbors 32 \
            --num-inducing 64 \
            --fit-batch-size 512 \
            --batch-size 512

      - name: Validate backend benchmark status
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          status_path = Path("nightly_backend_benchmark") / "backend_smoke_status.json"
          status = json.loads(status_path.read_text(encoding="utf-8"))
          if not status.get("ok", False):
              raise SystemExit(f"Backend benchmark failed: {status}")
          PY

      - name: Publish backend benchmark summary
        if: always()
        run: |
          REPORT="${OUTPUT_DIR}/${BENCHMARK_NAME}_report.md"
          if [ -f "${REPORT}" ]; then
            cat "${REPORT}" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Upload backend benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: nightly-backend-benchmark-smoke
          path: |
            ${{ env.OUTPUT_DIR }}/${{ env.BENCHMARK_NAME }}.csv
            ${{ env.OUTPUT_DIR }}/${{ env.BENCHMARK_NAME }}_config.json
            ${{ env.OUTPUT_DIR }}/${{ env.BENCHMARK_NAME }}_report.md
            ${{ env.OUTPUT_DIR }}/${{ env.BENCHMARK_NAME }}_status.json

  nightly-summary:
    name: Nightly evidence summary
    needs:
      - synthetic-quick
      - real-poster-smoke
      - backend-smoke
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Download nightly artifacts
        uses: actions/download-artifact@v7
        with:
          path: nightly_artifacts
          merge-multiple: false

      - name: Build summary index
        run: |
          python - <<'PY'
          from pathlib import Path

          root = Path("nightly_artifacts")
          out = Path("nightly_summary")
          out.mkdir(parents=True, exist_ok=True)
          reports = sorted(root.rglob("*.md"))
          lines = ["# Nightly CPU Evidence", ""]
          if not reports:
              lines.append("No Markdown reports were found in downloaded artifacts.")
          for report in reports:
              lines.extend(["", f"## {report.relative_to(root)}", ""])
              lines.append(report.read_text(encoding="utf-8"))
          (out / "nightly_cpu_evidence_summary.md").write_text("\n".join(lines).rstrip() + "\n", encoding="utf-8")
          print((out / "nightly_cpu_evidence_summary.md").read_text(encoding="utf-8"))
          PY
          cat nightly_summary/nightly_cpu_evidence_summary.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload combined nightly summary
        uses: actions/upload-artifact@v7
        with:
          name: nightly-cpu-evidence-summary
          path: nightly_summary/**
