---
name: Prepare Tanks and Temples Cache

on: # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      runs_on_json:
        description: JSON array for runs-on, e.g. ["ubuntu-latest"] or ["self-hosted","linux","datasets"].
        required: true
        type: string
        default: '["ubuntu-latest"]'
      scene:
        description: Tanks and Temples scene to cache.
        required: true
        type: choice
        default: Ignatius
        options:
          - Barn
          - Ignatius
          - Truck
      max_images:
        description: Maximum number of images to extract. Use 0 for all images.
        required: true
        type: number
        default: 0
      cache_version:
        description: Bump this to invalidate the downloaded-data cache.
        required: true
        type: string
        default: v1

permissions:
  contents: read

concurrency:
  group: prepare-tanks-temples-cache-${{ github.ref }}-${{ inputs.scene }}-${{ inputs.max_images }}
  cancel-in-progress: false

jobs:
  prepare-cache:
    name: Prepare ${{ inputs.scene }} cache
    runs-on: ${{ fromJSON(inputs.runs_on_json) }}
    timeout-minutes: 240
    env:
      TNT_SCENE: ${{ inputs.scene }}
      DOWNLOAD_ROOT: real_scenes/_downloads
      MAX_IMAGES: ${{ inputs.max_images }}
      DATA_CACHE_VERSION: ${{ inputs.cache_version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Ensure Tanks and Temples assets
        id: tnt-cache
        uses: ./.github/actions/ensure-tanks-temples-assets
        with:
          scene: ${{ env.TNT_SCENE }}
          download-root: ${{ env.DOWNLOAD_ROOT }}
          max-images: ${{ env.MAX_IMAGES }}
          cache-key: tnt-${{ runner.os }}-${{ env.TNT_SCENE }}-images${{ env.MAX_IMAGES }}-${{ env.DATA_CACHE_VERSION }}
          cache-version: ${{ env.DATA_CACHE_VERSION }}

      - name: Summarize cache
        run: |
          {
            echo "# Tanks and Temples cache"
            echo
            echo "- Scene: \`${{ env.TNT_SCENE }}\`"
            echo "- Source: \`${{ steps.tnt-cache.outputs.source }}\`"
            echo "- Cache hit: \`${{ steps.tnt-cache.outputs.cache-hit }}\`"
            echo "- Scene directory: \`${{ steps.tnt-cache.outputs.scene-dir }}\`"
            echo
            echo '```text'
            du -sh "${{ steps.tnt-cache.outputs.scene-dir }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
