---
name: GPIS Splatting CI

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - main
    paths:
      - "src/gpis_splatting/**"
      - "benchmarks/**"
      - "tests/**"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/gpis-splatting-ci.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/gpis_splatting/**"
      - "benchmarks/**"
      - "tests/**"
      - "requirements-dev.txt"
      - "pyproject.toml"
      - "README.md"
      - ".github/workflows/gpis-splatting-ci.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests-and-smoke:
    name: Tests + CLI smoke (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Run lint checks
        run: python -m ruff check .

      - name: Run test suite
        run: |
          mkdir -p test-results
          python -m pytest \
            --rootdir . \
            -q \
            --strict-config \
            --junitxml=test-results/junit-py${{ matrix.python-version }}.xml \
            tests

      - name: Run GPIS splatting CLI smoke test
        run: |
          python -m gpis_splatting.cli.generate_scene \
            --shape sphere \
            --scene ci_sphere \
            --num-points 80 \
            --noise-std 0.03 \
            --seed 5 \
            --output-root ci_smoke
          python -m gpis_splatting.cli.fit_gpis \
            --scene ci_sphere \
            --grid-size 12 \
            --output-root ci_smoke
          python -m gpis_splatting.cli.render_splats \
            --scene ci_sphere \
            --view front \
            --image-size 48 \
            --num-splats 120 \
            --epsilon 0.11 \
            --feedback-iterations 1 \
            --feedback-pseudo-points 16 \
            --feedback-min-gate 0.0 \
            --output-root ci_smoke
          python -m gpis_splatting.cli.evaluate \
            --scene ci_sphere \
            --output-root ci_smoke

      - name: Validate smoke-test metrics
        run: |
          python - <<'PY'
          from pathlib import Path
          import pandas as pd

          scene_dir = Path("ci_smoke/ci_sphere")
          required = [
              "config.json",
              "samples.npz",
              "gpis_model.npz",
              "posterior_grid.npz",
              "splats.npz",
              "render_reference_front.png",
              "render_plain_front.png",
              "render_gpis_front.png",
              "render_feedback_front.png",
              "feedback_gpis_model.npz",
              "feedback_trace.csv",
              "feedback_splat_gates.npz",
              "metrics.csv",
          ]
          missing = [name for name in required if not (scene_dir / name).exists()]
          assert not missing, f"missing smoke-test artifacts: {missing}"

          metrics = pd.read_csv(scene_dir / "metrics.csv").iloc[0]
          assert metrics["rmse_sdf"] < 0.4
          assert metrics["iou_inside"] > 0.35
          assert metrics["psnr_gpis_front"] >= metrics["psnr_plain_front"]
          assert "psnr_feedback_front" in metrics
          assert "feedback_rmse_sdf" in metrics

          print(metrics.to_string())
          PY

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-py${{ matrix.python-version }}
          path: test-results/junit-py${{ matrix.python-version }}.xml

      - name: Upload smoke-test artifacts
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: gpis-splatting-smoke
          path: |
            ci_smoke/ci_sphere/metrics.csv
            ci_smoke/ci_sphere/render_reference_front.png
            ci_smoke/ci_sphere/render_plain_front.png
            ci_smoke/ci_sphere/render_gpis_front.png
            ci_smoke/ci_sphere/render_feedback_front.png
            ci_smoke/ci_sphere/feedback_trace.csv
            ci_smoke/ci_sphere/gpis_surface.png
            ci_smoke/ci_sphere/uncertainty_slice.png

  package-smoke:
    name: Build package and verify CLI entry points
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Build wheel and sdist
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m build

      - name: Install built wheel with dependencies
        run: |
          python -m pip install --force-reinstall dist/*.whl

      - name: Verify console entry points
        run: |
          generate_scene --help > /dev/null
          fit_gpis --help > /dev/null
          render_splats --help > /dev/null
          evaluate --help > /dev/null
          run_ablation --help > /dev/null
          summarize_ablation --help > /dev/null
          run_evaluation --help > /dev/null
          prepare_real_scene --help > /dev/null
          validate_real_scene --help > /dev/null
          evaluate_real_renders --help > /dev/null
          download_real_scene --help > /dev/null
          bootstrap_real_gpis --help > /dev/null
          fit_real_gpis --help > /dev/null
          render_real_splats --help > /dev/null
          run_real_evaluation --help > /dev/null
          diagnose_real_render --help > /dev/null

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gpis-splatting-package-dist
          path: dist/*
