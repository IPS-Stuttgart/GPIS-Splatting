---
# yamllint disable rule:line-length
name: Trained 3DGS Photometric Evaluation

on:  # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      prepared_scene:
        description: Prepared scene directory under real_scenes/.
        required: true
        type: string
        default: barn_selfhosted_m25000_t2500_s12
      trained_ply_path:
        description: Path to a trained 3DGS point_cloud.ply on the self-hosted runner.
        required: true
        type: string
      gpis_model_path:
        description: GPIS model path, absolute or relative to the prepared scene.
        required: true
        type: string
        default: selfhosted_calibrated_confidence_gpis_model.npz
      method_name:
        description: Method prefix for trained-3DGS GPIS scoring and variant outputs.
        required: true
        type: string
        default: trained_3dgs
      max_pred_points:
        description: Splat-center scoring cap. Use 0 to score all trained Gaussians.
        required: true
        type: number
        default: 0
      max_gt_points:
        description: Ground-truth point cap for nearest-GT labels. Use 0 for all.
        required: true
        type: number
        default: 150000
      thresholds:
        description: Space-separated geometry thresholds for calibration labels.
        required: true
        type: string
        default: "0.02 0.05 0.1"
      calibration_threshold:
        description: Geometry threshold whose calibrated confidence gate is exported.
        required: true
        type: string
        default: "0.05"
      gate_thresholds:
        description: Space-separated confidence thresholds for filtered 3DGS variants.
        required: true
        type: string
        default: "0.25 0.5 0.75"
      iteration:
        description: Iteration directory name to write in exported 3DGS model variants.
        required: true
        type: number
        default: 30000
      opacity_mode:
        description: Interpretation of the 3DGS opacity PLY property.
        required: true
        type: choice
        default: logit
        options:
          - logit
          - linear
      render_command_template:
        description: Optional shell command template to render each variant. Placeholders include {model_dir}, {output_dir}, {scene_dir}, {variant}, {iteration}, {point_cloud_path}.
        required: false
        type: string
        default: ""
      rendered_predictions_root:
        description: Optional existing root containing rendered variant directories. Overrides the workflow render root for evaluation.
        required: false
        type: string
        default: ""
      prediction_subdir:
        description: Optional relative image subdirectory below each rendered variant directory.
        required: false
        type: string
        default: ""
      render_split:
        description: Prepared-scene split to evaluate.
        required: true
        type: string
        default: test
      compute_lpips:
        description: Compute LPIPS if the lpips package is available.
        required: true
        type: boolean
        default: false
      require_all_images:
        description: Fail if any split image is missing from a rendered variant directory.
        required: true
        type: boolean
        default: true
      benchmark_target:
        description: Optional benchmark target JSON passed to evaluate_real_renders.
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: trained-3dgs-photometric-${{ github.ref }}-${{ inputs.prepared_scene }}
  cancel-in-progress: false

jobs:
  trained-3dgs-photometric:
    name: ${{ inputs.prepared_scene }} trained-3DGS photometric evaluation
    runs-on:
      - self-hosted
      - Linux
      - X64
      - gpis-splatting
      - second-server
    timeout-minutes: 1440

    env:
      PREPARED_SCENE: ${{ inputs.prepared_scene }}
      TRAINED_PLY_PATH: ${{ inputs.trained_ply_path }}
      GPIS_MODEL_PATH: ${{ inputs.gpis_model_path }}
      METHOD_NAME: ${{ inputs.method_name }}
      MAX_PRED_POINTS: ${{ inputs.max_pred_points }}
      MAX_GT_POINTS: ${{ inputs.max_gt_points }}
      THRESHOLDS: ${{ inputs.thresholds }}
      CALIBRATION_THRESHOLD: ${{ inputs.calibration_threshold }}
      GATE_THRESHOLDS: ${{ inputs.gate_thresholds }}
      ITERATION: ${{ inputs.iteration }}
      OPACITY_MODE: ${{ inputs.opacity_mode }}
      RENDER_COMMAND_TEMPLATE: ${{ inputs.render_command_template }}
      RENDERED_PREDICTIONS_ROOT: ${{ inputs.rendered_predictions_root }}
      PREDICTION_SUBDIR: ${{ inputs.prediction_subdir }}
      RENDER_SPLIT: ${{ inputs.render_split }}
      COMPUTE_LPIPS: ${{ inputs.compute_lpips }}
      REQUIRE_ALL_IMAGES: ${{ inputs.require_all_images }}
      BENCHMARK_TARGET: ${{ inputs.benchmark_target }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Validate inputs and derive paths
        shell: bash
        run: |
          python - <<'PY' >> "${GITHUB_ENV}"
          from __future__ import annotations

          import os
          from pathlib import Path

          from gpis_splatting.real_geometry import format_threshold_label

          scene_dir = Path("real_scenes") / os.environ["PREPARED_SCENE"]
          trained_ply = Path(os.environ["TRAINED_PLY_PATH"])
          if not scene_dir.is_dir():
              raise SystemExit(f"Prepared scene directory does not exist: {scene_dir}")
          if not trained_ply.is_file():
              raise SystemExit(f"Trained 3DGS PLY does not exist: {trained_ply}")

          method = os.environ["METHOD_NAME"]
          threshold_label = format_threshold_label(float(os.environ["CALIBRATION_THRESHOLD"]))
          evaluations = scene_dir / "evaluations"
          variants = scene_dir / "trained_3dgs_variants" / method
          renders = scene_dir / "renders" / f"{method}_variants"
          print(f"SCENE_DIR={scene_dir}")
          print(f"EVALUATIONS_DIR={evaluations}")
          print(f"TRAINED_SPLATS_FILE={method}_splats.npz")
          print(f"TRAINED_SPLATS_PATH={scene_dir / f'{method}_splats.npz'}")
          print(f"TRAINED_SPLATS_STATUS_PATH={scene_dir / f'{method}_splats.json'}")
          print(f"FIELD_SCORES_PATH={evaluations / f'{method}_gpis_field_scores.csv'}")
          print(f"CALIBRATED_GATE_PATH={evaluations / f'{method}_calibrated_gate_{threshold_label}.npz'}")
          print(f"VARIANTS_DIR={variants}")
          print(f"MANIFEST_PATH={variants / f'{method}_3dgs_variant_manifest.csv'}")
          print(f"RENDER_OUTPUT_ROOT={renders}")
          PY

      - name: Convert trained 3DGS PLY to GPIS-scored splats
        run: |
          python -m gpis_splatting.cli.convert_3dgs_ply_to_splats \
            --input-ply "${TRAINED_PLY_PATH}" \
            --output-splats "${TRAINED_SPLATS_PATH}" \
            --opacity-mode "${OPACITY_MODE}"
          python - <<'PY' >> "${GITHUB_ENV}"
          import json
          import os
          from pathlib import Path

          status = json.loads(Path(os.environ["TRAINED_SPLATS_PATH"]).with_suffix(".json").read_text(encoding="utf-8"))
          print(f"GAUSSIAN_COUNT={status['splat_count']}")
          PY

      - name: Score trained 3DGS Gaussians with GPIS field confidence
        run: |
          read -r -a THRESHOLD_ARGS <<< "${THRESHOLDS}"
          python -m gpis_splatting.cli.diagnose_tanks_temples_gpis_field_scores \
            --scene-dir "${SCENE_DIR}" \
            --splats-path "${TRAINED_SPLATS_FILE}" \
            --model-path "${GPIS_MODEL_PATH}" \
            --method-name "${METHOD_NAME}" \
            --thresholds "${THRESHOLD_ARGS[@]}" \
            --max-pred-points "${MAX_PRED_POINTS}" \
            --max-gt-points "${MAX_GT_POINTS}"

      - name: Calibrate GPIS confidence for trained 3DGS Gaussians
        run: |
          read -r -a THRESHOLD_ARGS <<< "${THRESHOLDS}"
          python -m gpis_splatting.cli.calibrate_gpis_splat_scores \
            --field-scores-path "${FIELD_SCORES_PATH}" \
            --thresholds "${THRESHOLD_ARGS[@]}" \
            --gate-count "${GAUSSIAN_COUNT}"

      - name: Export renderable GPIS-gated 3DGS variants
        run: |
          read -r -a GATE_THRESHOLD_ARGS <<< "${GATE_THRESHOLDS}"
          python -m gpis_splatting.cli.export_3dgs_gpis_variants \
            --input-ply "${TRAINED_PLY_PATH}" \
            --gate-path "${CALIBRATED_GATE_PATH}" \
            --output-dir "${VARIANTS_DIR}" \
            --method-name "${METHOD_NAME}" \
            --iteration "${ITERATION}" \
            --gate-thresholds "${GATE_THRESHOLD_ARGS[@]}" \
            --opacity-mode "${OPACITY_MODE}"

      - name: Render trained 3DGS variants
        if: ${{ inputs.render_command_template != '' }}
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import os
          import subprocess
          from pathlib import Path

          import pandas as pd

          template = os.environ["RENDER_COMMAND_TEMPLATE"].strip()
          manifest = pd.read_csv(os.environ["MANIFEST_PATH"])
          render_root = Path(os.environ["RENDER_OUTPUT_ROOT"])
          render_root.mkdir(parents=True, exist_ok=True)
          for row in manifest.to_dict(orient="records"):
              variant = str(row["variant"])
              output_dir = render_root / variant
              output_dir.mkdir(parents=True, exist_ok=True)
              command = template.format(
                  model_dir=row["model_dir"],
                  output_dir=output_dir,
                  scene_dir=os.environ["SCENE_DIR"],
                  variant=variant,
                  iteration=os.environ["ITERATION"],
                  point_cloud_path=row["point_cloud_path"],
              )
              print(f"::group::Render {variant}")
              print(command)
              subprocess.run(command, shell=True, check=True)
              print("::endgroup::")
          PY

      - name: Select render predictions root
        shell: bash
        run: |
          if [ -n "${RENDERED_PREDICTIONS_ROOT}" ]; then
            echo "PREDICTIONS_ROOT=${RENDERED_PREDICTIONS_ROOT}" >> "${GITHUB_ENV}"
            echo "EVALUATE_RENDERED_VARIANTS=true" >> "${GITHUB_ENV}"
          elif [ -n "${RENDER_COMMAND_TEMPLATE}" ]; then
            echo "PREDICTIONS_ROOT=${RENDER_OUTPUT_ROOT}" >> "${GITHUB_ENV}"
            echo "EVALUATE_RENDERED_VARIANTS=true" >> "${GITHUB_ENV}"
          else
            echo "EVALUATE_RENDERED_VARIANTS=false" >> "${GITHUB_ENV}"
          fi

      - name: Evaluate trained 3DGS variant renders
        shell: bash
        run: |
          if [ "${EVALUATE_RENDERED_VARIANTS}" != "true" ]; then
            echo "No render command or rendered_predictions_root was provided; skipping render metric evaluation."
            exit 0
          fi
          ARGS=(
            --manifest-path "${MANIFEST_PATH}"
            --scene-dir "${SCENE_DIR}"
            --predictions-root "${PREDICTIONS_ROOT}"
            --output-dir "${EVALUATIONS_DIR}"
            --method-name "${METHOD_NAME}"
            --split "${RENDER_SPLIT}"
            --prediction-subdir "${PREDICTION_SUBDIR}"
            --compute-lpips "${COMPUTE_LPIPS}"
            --require-all-images "${REQUIRE_ALL_IMAGES}"
          )
          if [ -n "${BENCHMARK_TARGET}" ]; then
            ARGS+=(--benchmark-target "${BENCHMARK_TARGET}")
          fi
          python -m gpis_splatting.cli.evaluate_3dgs_variant_renders "${ARGS[@]}"

      - name: Publish workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Trained 3DGS photometric evaluation"
            echo
            echo "- Prepared scene: \`${PREPARED_SCENE}\`"
            echo "- Trained PLY: \`${TRAINED_PLY_PATH}\`"
            echo "- Manifest: \`${MANIFEST_PATH}\`"
            echo "- Calibrated gate: \`${CALIBRATED_GATE_PATH}\`"
            echo "- Render evaluation enabled: \`${EVALUATE_RENDERED_VARIANTS:-false}\`"
            if [ -f "${EVALUATIONS_DIR}/${METHOD_NAME}_3dgs_render_evaluation_report.md" ]; then
              echo
              cat "${EVALUATIONS_DIR}/${METHOD_NAME}_3dgs_render_evaluation_report.md"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload trained 3DGS evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trained-3dgs-photometric-${{ env.PREPARED_SCENE }}-${{ env.METHOD_NAME }}
          path: |
            real_scenes/${{ env.PREPARED_SCENE }}/${{ env.METHOD_NAME }}_splats.json
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_gpis_field_scores.csv
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_gpis_field_score_summary.csv
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_gpis_field_score_ranked.csv
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_gpis_field_score_status.json
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_gpis_field_score_report.md
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_calibrated_splat_scores.csv
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_calibrated_calibration_summary.csv
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_calibrated_calibration_ranked.csv
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_calibrated_calibration_status.json
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_calibrated_calibration_report.md
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_calibrated_confidence.npz
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_calibrated_gate_*.npz
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_3dgs_render_*.csv
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_3dgs_render_*.json
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_3dgs_render_*.md
            real_scenes/${{ env.PREPARED_SCENE }}/trained_3dgs_variants/${{ env.METHOD_NAME }}/${{ env.METHOD_NAME }}_3dgs_variant_manifest.csv
            real_scenes/${{ env.PREPARED_SCENE }}/trained_3dgs_variants/${{ env.METHOD_NAME }}/${{ env.METHOD_NAME }}_3dgs_variant_status.json
            real_scenes/${{ env.PREPARED_SCENE }}/trained_3dgs_variants/${{ env.METHOD_NAME }}/${{ env.METHOD_NAME }}_3dgs_variant_report.md
