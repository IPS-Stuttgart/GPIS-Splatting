---
# yamllint disable rule:line-length
name: Trained 3DGS Photometric Evaluation

on: # yamllint disable-line rule:truthy
  workflow_dispatch:
    inputs:
      prepared_scene:
        description: Prepared scene directory under real_scenes/.
        required: true
        type: string
        default: barn_selfhosted_m25000_t2500_s12
      prepared_scene_artifact_run_id:
        description: Optional workflow run ID containing a prepared-scene artifact to restore before validation.
        required: false
        type: string
        default: ""
      prepared_scene_artifact_name:
        description: Optional artifact name from prepared_scene_artifact_run_id, for example self-hosted-calibrated-Barn-m25000-t2500-s12.
        required: false
        type: string
        default: ""
      prepared_scene_artifact_repository:
        description: Repository containing the prepared-scene artifact.
        required: false
        type: string
        default: IPS-Stuttgart/GPIS-Splatting
      trained_ply_path:
        description: Path to a trained 3DGS point_cloud.ply on the self-hosted runner. Leave empty when restoring a trained-model artifact.
        required: false
        type: string
        default: ""
      trained_model_artifact:
        description: Optional trained-model artifact spec as run_id|name|repository|ply_path. Repository defaults to this repo; ply_path is optional.
        required: false
        type: string
        default: ""
      gpis_model_path:
        description: GPIS model path, absolute or relative to the prepared scene.
        required: true
        type: string
        default: selfhosted_calibrated_confidence_gpis_model.npz
      method_name:
        description: Method prefix for trained-3DGS GPIS scoring and variant outputs.
        required: true
        type: string
        default: trained_3dgs
      max_pred_points:
        description: Splat-center scoring cap. Use 0 to score all trained Gaussians.
        required: true
        type: number
        default: 0
      max_gt_points:
        description: Ground-truth point cap for nearest-GT labels. Use 0 for all.
        required: true
        type: number
        default: 150000
      thresholds:
        description: Space-separated geometry thresholds for calibration labels.
        required: true
        type: string
        default: "0.02 0.05 0.1"
      calibration_threshold:
        description: Geometry threshold whose calibrated confidence gate is exported.
        required: true
        type: string
        default: "0.05"
      missing_gate_value:
        description: Gate value for trained Gaussians not scored by the GPIS field pass. Use 1.0 to preserve unscored Gaussians for fair photometric evaluation.
        required: true
        type: string
        default: "1.0"
      gate_thresholds:
        description: Space-separated confidence thresholds for filtered 3DGS variants.
        required: true
        type: string
        default: "0.25 0.5 0.75"
      iteration:
        description: Iteration directory name to write in exported 3DGS model variants.
        required: true
        type: number
        default: 30000
      opacity_mode:
        description: Interpretation of the 3DGS opacity PLY property.
        required: true
        type: choice
        default: logit
        options:
          - logit
          - linear
      render_command_template:
        description: Optional shell command template to render each variant. Placeholders include {model_dir}, {output_dir}, {scene_dir}, {variant}, {iteration}, {point_cloud_path}.
        required: false
        type: string
        default: ""
      rendered_predictions_root:
        description: Optional existing root containing rendered variant directories. Overrides the workflow render root for evaluation.
        required: false
        type: string
        default: ""
      prediction_subdir:
        description: Optional relative image subdirectory below each rendered variant directory.
        required: false
        type: string
        default: ""
      render_name_map_path:
        description: Optional render_name_map.csv from export_prepared_scene_to_colmap_3dgs for mapping standard 3DGS render names before evaluation.
        required: false
        type: string
        default: ""
      render_mapping_link_mode:
        description: How mapped render images are materialized when render_name_map_path is set.
        required: true
        type: choice
        default: copy
        options:
          - copy
          - hardlink
          - symlink
      render_split:
        description: Prepared-scene split to evaluate.
        required: true
        type: string
        default: test
      compute_lpips:
        description: Compute LPIPS if the lpips package is available.
        required: true
        type: boolean
        default: false
      require_all_images:
        description: Fail if any split image is missing from a rendered variant directory.
        required: true
        type: boolean
        default: true
      benchmark_target:
        description: Optional benchmark target JSON passed to evaluate_real_renders.
        required: false
        type: string
        default: ""

permissions:
  actions: read
  contents: read

concurrency:
  group: trained-3dgs-photometric-${{ github.ref }}-${{ inputs.prepared_scene }}
  cancel-in-progress: false

jobs:
  trained-3dgs-photometric:
    name: ${{ inputs.prepared_scene }} trained-3DGS photometric evaluation
    runs-on:
      - self-hosted
      - Linux
    timeout-minutes: 1440

    env:
      PREPARED_SCENE: ${{ inputs.prepared_scene }}
      PREPARED_SCENE_ARTIFACT_RUN_ID: ${{ inputs.prepared_scene_artifact_run_id }}
      PREPARED_SCENE_ARTIFACT_NAME: ${{ inputs.prepared_scene_artifact_name }}
      PREPARED_SCENE_ARTIFACT_REPOSITORY: ${{ inputs.prepared_scene_artifact_repository }}
      TRAINED_PLY_PATH: ${{ inputs.trained_ply_path }}
      TRAINED_MODEL_ARTIFACT_SPEC: ${{ inputs.trained_model_artifact }}
      GPIS_MODEL_PATH: ${{ inputs.gpis_model_path }}
      METHOD_NAME: ${{ inputs.method_name }}
      MAX_PRED_POINTS: ${{ inputs.max_pred_points }}
      MAX_GT_POINTS: ${{ inputs.max_gt_points }}
      THRESHOLDS: ${{ inputs.thresholds }}
      CALIBRATION_THRESHOLD: ${{ inputs.calibration_threshold }}
      MISSING_GATE_VALUE: ${{ inputs.missing_gate_value }}
      GATE_THRESHOLDS: ${{ inputs.gate_thresholds }}
      ITERATION: ${{ inputs.iteration }}
      OPACITY_MODE: ${{ inputs.opacity_mode }}
      RENDER_COMMAND_TEMPLATE: ${{ inputs.render_command_template }}
      RENDERED_PREDICTIONS_ROOT: ${{ inputs.rendered_predictions_root }}
      PREDICTION_SUBDIR: ${{ inputs.prediction_subdir }}
      RENDER_NAME_MAP_PATH: ${{ inputs.render_name_map_path }}
      RENDER_MAPPING_LINK_MODE: ${{ inputs.render_mapping_link_mode }}
      RENDER_SPLIT: ${{ inputs.render_split }}
      COMPUTE_LPIPS: ${{ inputs.compute_lpips }}
      REQUIRE_ALL_IMAGES: ${{ inputs.require_all_images }}
      BENCHMARK_TARGET: ${{ inputs.benchmark_target }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Set up Python
        # setup-python@v6 intermittently hangs after installing Python on the
        # temporary self-hosted runners used for these heavy evaluations.
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements-dev.txt
            pyproject.toml

      - name: Validate prepared-scene artifact inputs
        if: ${{ inputs.prepared_scene_artifact_run_id != '' || inputs.prepared_scene_artifact_name != '' }}
        shell: bash
        run: |
          if [ -z "${PREPARED_SCENE_ARTIFACT_RUN_ID}" ] || [ -z "${PREPARED_SCENE_ARTIFACT_NAME}" ]; then
            echo "prepared_scene_artifact_run_id and prepared_scene_artifact_name must be set together." >&2
            exit 2
          fi

      - name: Parse trained-model artifact spec
        shell: bash
        run: |
          python - <<'PY' | tee -a "${GITHUB_ENV}" > _trained_model_artifact.env
          from __future__ import annotations

          import os

          spec = os.environ["TRAINED_MODEL_ARTIFACT_SPEC"].strip()
          run_id = ""
          name = ""
          repository = "IPS-Stuttgart/GPIS-Splatting"
          ply_path = ""
          if spec:
              parts = spec.split("|")
              if len(parts) < 2 or len(parts) > 4:
                  raise SystemExit(
                      "trained_model_artifact must use run_id|name|repository|ply_path "
                      "with repository and ply_path optional."
                  )
              run_id = parts[0].strip()
              name = parts[1].strip()
              if len(parts) >= 3 and parts[2].strip():
                  repository = parts[2].strip()
              if len(parts) >= 4 and parts[3].strip():
                  ply_path = parts[3].strip()
              if not run_id or not name:
                  raise SystemExit("trained_model_artifact requires non-empty run_id and name.")
          print(f"TRAINED_MODEL_ARTIFACT_RUN_ID={run_id}")
          print(f"TRAINED_MODEL_ARTIFACT_NAME={name}")
          print(f"TRAINED_MODEL_ARTIFACT_REPOSITORY={repository}")
          print(f"TRAINED_MODEL_ARTIFACT_PLY_PATH={ply_path}")
          PY
          . _trained_model_artifact.env

      - name: Validate trained-model source inputs
        shell: bash
        run: |
          set -euo pipefail
          has_artifact=false
          if [ -n "${TRAINED_MODEL_ARTIFACT_RUN_ID}" ] || [ -n "${TRAINED_MODEL_ARTIFACT_NAME}" ]; then
            if [ -z "${TRAINED_MODEL_ARTIFACT_RUN_ID}" ] || [ -z "${TRAINED_MODEL_ARTIFACT_NAME}" ]; then
              echo "trained_model_artifact_run_id and trained_model_artifact_name must be set together." >&2
              exit 2
            fi
            has_artifact=true
          fi
          if [ -z "${TRAINED_PLY_PATH}" ] && [ "${has_artifact}" != "true" ]; then
            echo "Set trained_ply_path or provide a trained_model_artifact_run_id/name pair." >&2
            exit 2
          fi

      - name: Select prepared-scene source
        shell: bash
        run: |
          python - <<'PY' | tee -a "${GITHUB_ENV}" > _prepared_scene_source.env
          from __future__ import annotations

          import os
          from pathlib import Path

          scene_dir = Path("real_scenes") / os.environ["PREPARED_SCENE"]
          has_local_scene = all(
              (scene_dir / name).is_file()
              for name in ("real_scene.json", "cameras.json", "splits.json")
          )
          has_artifact_inputs = bool(os.environ["PREPARED_SCENE_ARTIFACT_RUN_ID"]) and bool(
              os.environ["PREPARED_SCENE_ARTIFACT_NAME"]
          )
          use_artifact = has_artifact_inputs and not has_local_scene
          print(f"USE_PREPARED_SCENE_ARTIFACT={str(use_artifact).lower()}")
          print(f"PREPARED_SCENE_LOCAL_HIT={str(has_local_scene).lower()}")
          PY
          . _prepared_scene_source.env

          if [ "${PREPARED_SCENE_LOCAL_HIT}" = "true" ]; then
            echo "Using existing prepared scene at real_scenes/${PREPARED_SCENE}."
          elif [ "${USE_PREPARED_SCENE_ARTIFACT}" = "true" ]; then
            echo "Prepared scene not present locally; downloading ${PREPARED_SCENE_ARTIFACT_NAME}."
          else
            echo "Prepared scene not present locally and no artifact inputs were supplied."
          fi

      - name: Download prepared-scene artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${USE_PREPARED_SCENE_ARTIFACT:-false}" != "true" ]; then
            echo "Skipping prepared-scene artifact download."
            exit 0
          fi

          rm -rf _prepared_scene_artifact _prepared_scene_artifact.zip
          mkdir -p _prepared_scene_artifact

          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import urllib.request

          repository = os.environ["PREPARED_SCENE_ARTIFACT_REPOSITORY"]
          run_id = os.environ["PREPARED_SCENE_ARTIFACT_RUN_ID"]
          artifact_name = os.environ["PREPARED_SCENE_ARTIFACT_NAME"]
          token = os.environ["GH_TOKEN"]
          artifacts_url = (
              f"https://api.github.com/repos/{repository}/actions/runs/"
              f"{run_id}/artifacts?per_page=100"
          )
          request = urllib.request.Request(
              artifacts_url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request, timeout=60) as response:
              payload = json.load(response)

          matches = [
              artifact
              for artifact in payload.get("artifacts", [])
              if artifact.get("name") == artifact_name
          ]
          if not matches:
              available = ", ".join(
                  sorted(artifact.get("name", "<unnamed>") for artifact in payload.get("artifacts", []))
              )
              raise SystemExit(
                  f"Could not find prepared-scene artifact {artifact_name!r} "
                  f"in {repository} run {run_id}. Available artifacts: {available}"
              )

          artifact = matches[0]
          if artifact.get("expired"):
              raise SystemExit(f"Prepared-scene artifact {artifact_name!r} is expired.")

          with open("_prepared_scene_artifact_url.txt", "w", encoding="utf-8") as handle:
              handle.write(str(artifact["archive_download_url"]))
          print(
              "Resolved prepared-scene artifact "
              f"{artifact_name!r}: id={artifact.get('id')} size={artifact.get('size_in_bytes')} bytes"
          )
          PY

          artifact_url="$(cat _prepared_scene_artifact_url.txt)"
          curl --fail --location --show-error --retry 5 --retry-delay 10 \
            --connect-timeout 30 --max-time 2400 --speed-limit 1024 --speed-time 120 \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --output _prepared_scene_artifact.zip \
            "${artifact_url}"
          unzip -q _prepared_scene_artifact.zip -d _prepared_scene_artifact
          python - <<'PY'
          from __future__ import annotations

          from pathlib import Path

          root = Path("_prepared_scene_artifact")
          files = [path for path in root.rglob("*") if path.is_file()]
          total_size = sum(path.stat().st_size for path in files)
          print(f"Downloaded prepared-scene artifact files={len(files)} size={total_size} bytes")
          PY

      - name: Restore prepared scene from artifact
        shell: bash
        run: |
          if [ "${USE_PREPARED_SCENE_ARTIFACT:-false}" != "true" ]; then
            echo "Skipping prepared-scene artifact restore."
            exit 0
          fi
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import shutil
          from pathlib import Path

          artifact_root = Path("_prepared_scene_artifact")
          scene_name = os.environ["PREPARED_SCENE"]
          destination = Path("real_scenes") / scene_name

          def has_scene_metadata(path: Path) -> bool:
              return (path / "real_scene.json").is_file() and (path / "cameras.json").is_file() and (path / "splits.json").is_file()

          candidates = [
              artifact_root / "real_scenes" / scene_name,
              artifact_root / scene_name,
          ]
          candidates.extend(path for path in artifact_root.rglob(scene_name) if path.is_dir())
          scene_source = next((path for path in candidates if has_scene_metadata(path)), None)
          if scene_source is None:
              raise SystemExit(f"Could not find prepared scene {scene_name!r} in artifact {artifact_root}")

          if destination.exists():
              shutil.rmtree(destination)
          destination.parent.mkdir(parents=True, exist_ok=True)
          shutil.copytree(scene_source, destination)

          downloads_source = artifact_root / "real_scenes" / "_downloads"
          if not downloads_source.exists():
              downloads_source = artifact_root / "_downloads"
          if downloads_source.exists():
              downloads_destination = Path("real_scenes") / "_downloads"
              downloads_destination.parent.mkdir(parents=True, exist_ok=True)
              shutil.copytree(downloads_source, downloads_destination, dirs_exist_ok=True)

          meta_path = destination / "real_scene.json"
          meta = json.loads(meta_path.read_text(encoding="utf-8"))
          source_scene = meta.get("source_scene")
          tanks_temples = meta.get("tanks_temples")
          if source_scene and isinstance(tanks_temples, dict):
              local_download = Path("real_scenes") / "_downloads" / "tanks_temples" / str(source_scene)
              replacements = {
                  "alignment_path": local_download / "alignment" / f"{source_scene}.txt",
                  "camera_log_path": local_download / "camera_poses" / f"{source_scene}.log",
                  "crop_path": local_download / "crop" / f"{source_scene}.json",
                  "ground_truth_path": local_download / "ground_truth" / f"{source_scene}.ply",
                  "reconstruction_path": local_download / "reconstruction" / f"{source_scene}.ply",
              }
              for key, local_path in replacements.items():
                  if local_path.exists():
                      tanks_temples[key] = str(local_path)
              if local_download.exists():
                  meta["source_dir"] = str(local_download)
              meta_path.write_text(json.dumps(meta, indent=2) + "\n", encoding="utf-8")

          print(f"Restored prepared scene from artifact: {scene_source} -> {destination}")
          PY

      - name: Download trained-model artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -n "${TRAINED_PLY_PATH}" ] && [ -f "${TRAINED_PLY_PATH}" ]; then
            echo "Using existing trained PLY at ${TRAINED_PLY_PATH}."
            exit 0
          fi
          if [ -z "${TRAINED_MODEL_ARTIFACT_RUN_ID}" ] || [ -z "${TRAINED_MODEL_ARTIFACT_NAME}" ]; then
            echo "Skipping trained-model artifact download."
            exit 0
          fi

          rm -rf _trained_model_artifact _trained_model_artifact.zip
          mkdir -p _trained_model_artifact

          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import urllib.request

          repository = os.environ["TRAINED_MODEL_ARTIFACT_REPOSITORY"]
          run_id = os.environ["TRAINED_MODEL_ARTIFACT_RUN_ID"]
          artifact_name = os.environ["TRAINED_MODEL_ARTIFACT_NAME"]
          token = os.environ["GH_TOKEN"]
          artifacts_url = (
              f"https://api.github.com/repos/{repository}/actions/runs/"
              f"{run_id}/artifacts?per_page=100"
          )
          request = urllib.request.Request(
              artifacts_url,
              headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {token}",
                  "X-GitHub-Api-Version": "2022-11-28",
              },
          )
          with urllib.request.urlopen(request, timeout=60) as response:
              payload = json.load(response)

          matches = [
              artifact
              for artifact in payload.get("artifacts", [])
              if artifact.get("name") == artifact_name
          ]
          if not matches:
              available = ", ".join(
                  sorted(artifact.get("name", "<unnamed>") for artifact in payload.get("artifacts", []))
              )
              raise SystemExit(
                  f"Could not find trained-model artifact {artifact_name!r} "
                  f"in {repository} run {run_id}. Available artifacts: {available}"
              )

          artifact = matches[0]
          if artifact.get("expired"):
              raise SystemExit(f"Trained-model artifact {artifact_name!r} is expired.")

          with open("_trained_model_artifact_url.txt", "w", encoding="utf-8") as handle:
              handle.write(str(artifact["archive_download_url"]))
          print(
              "Resolved trained-model artifact "
              f"{artifact_name!r}: id={artifact.get('id')} size={artifact.get('size_in_bytes')} bytes"
          )
          PY

          artifact_url="$(cat _trained_model_artifact_url.txt)"
          curl --fail --location --show-error --retry 5 --retry-delay 10 \
            --connect-timeout 30 --max-time 2400 --speed-limit 1024 --speed-time 120 \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --output _trained_model_artifact.zip \
            "${artifact_url}"
          unzip -q _trained_model_artifact.zip -d _trained_model_artifact

      - name: Resolve trained PLY from artifact
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${TRAINED_PLY_PATH}" ] && [ -f "${TRAINED_PLY_PATH}" ]; then
            echo "Using existing trained PLY at ${TRAINED_PLY_PATH}."
            exit 0
          fi
          if [ ! -d _trained_model_artifact ]; then
            echo "No trained-model artifact was restored."
            exit 0
          fi
          python - <<'PY' >> "${GITHUB_ENV}"
          from __future__ import annotations

          import os
          import re
          from pathlib import Path

          artifact_root = Path("_trained_model_artifact")
          relative_path = os.environ["TRAINED_MODEL_ARTIFACT_PLY_PATH"].strip()
          if relative_path:
              ply_path = artifact_root / relative_path
              if not ply_path.is_file():
                  raise SystemExit(f"Configured trained_model_artifact_ply_path does not exist: {ply_path}")
          else:
              candidates = list(artifact_root.rglob("point_cloud.ply"))
              if not candidates:
                  raise SystemExit(f"No point_cloud.ply found in trained-model artifact {artifact_root}")

              def iteration_key(path: Path) -> tuple[int, str]:
                  match = re.search(r"iteration_(\d+)", path.as_posix())
                  return (int(match.group(1)) if match else -1, path.as_posix())

              ply_path = sorted(candidates, key=iteration_key)[-1]
          print(f"TRAINED_PLY_PATH={ply_path}")
          PY

      - name: Install package and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt
          python -m pip install -e .

      - name: Validate inputs and derive paths
        shell: bash
        run: |
          python - <<'PY' >> "${GITHUB_ENV}"
          from __future__ import annotations

          import os
          from pathlib import Path

          from gpis_splatting.real_geometry import format_threshold_label

          scene_dir = Path("real_scenes") / os.environ["PREPARED_SCENE"]
          trained_ply = Path(os.environ["TRAINED_PLY_PATH"])
          if not scene_dir.is_dir():
              raise SystemExit(f"Prepared scene directory does not exist: {scene_dir}")
          if not trained_ply.is_file():
              raise SystemExit(f"Trained 3DGS PLY does not exist: {trained_ply}")

          method = os.environ["METHOD_NAME"]
          threshold_label = format_threshold_label(float(os.environ["CALIBRATION_THRESHOLD"]))
          evaluations = scene_dir / "evaluations"
          variants = scene_dir / "trained_3dgs_variants" / method
          renders = scene_dir / "renders" / f"{method}_variants"
          print(f"SCENE_DIR={scene_dir}")
          print(f"EVALUATIONS_DIR={evaluations}")
          print(f"TRAINED_SPLATS_FILE={method}_splats.npz")
          print(f"TRAINED_SPLATS_PATH={scene_dir / f'{method}_splats.npz'}")
          print(f"TRAINED_SPLATS_STATUS_PATH={scene_dir / f'{method}_splats.json'}")
          print(f"FIELD_SCORES_PATH={evaluations / f'{method}_gpis_field_scores.csv'}")
          print(f"CALIBRATED_GATE_PATH={evaluations / f'{method}_calibrated_gate_{threshold_label}.npz'}")
          print(f"VARIANTS_DIR={variants}")
          print(f"MANIFEST_PATH={variants / f'{method}_3dgs_variant_manifest.csv'}")
          print(f"RENDER_OUTPUT_ROOT={renders}")
          PY

      - name: Convert trained 3DGS PLY to GPIS-scored splats
        run: |
          python -m gpis_splatting.cli.convert_3dgs_ply_to_splats \
            --input-ply "${TRAINED_PLY_PATH}" \
            --output-splats "${TRAINED_SPLATS_PATH}" \
            --opacity-mode "${OPACITY_MODE}"
          python - <<'PY' >> "${GITHUB_ENV}"
          import json
          import os
          from pathlib import Path

          status = json.loads(Path(os.environ["TRAINED_SPLATS_PATH"]).with_suffix(".json").read_text(encoding="utf-8"))
          print(f"GAUSSIAN_COUNT={status['splat_count']}")
          PY

      - name: Score trained 3DGS Gaussians with GPIS field confidence
        run: |
          read -r -a THRESHOLD_ARGS <<< "${THRESHOLDS}"
          python -m gpis_splatting.cli.diagnose_tanks_temples_gpis_field_scores \
            --scene-dir "${SCENE_DIR}" \
            --splats-path "${TRAINED_SPLATS_FILE}" \
            --model-path "${GPIS_MODEL_PATH}" \
            --method-name "${METHOD_NAME}" \
            --thresholds "${THRESHOLD_ARGS[@]}" \
            --max-pred-points "${MAX_PRED_POINTS}" \
            --max-gt-points "${MAX_GT_POINTS}"

      - name: Calibrate GPIS confidence for trained 3DGS Gaussians
        run: |
          read -r -a THRESHOLD_ARGS <<< "${THRESHOLDS}"
          python -m gpis_splatting.cli.calibrate_gpis_splat_scores \
            --field-scores-path "${FIELD_SCORES_PATH}" \
            --thresholds "${THRESHOLD_ARGS[@]}" \
            --gate-count "${GAUSSIAN_COUNT}" \
            --missing-gate-value "${MISSING_GATE_VALUE}"

      - name: Export renderable GPIS-gated 3DGS variants
        run: |
          read -r -a GATE_THRESHOLD_ARGS <<< "${GATE_THRESHOLDS}"
          python -m gpis_splatting.cli.export_3dgs_gpis_variants \
            --input-ply "${TRAINED_PLY_PATH}" \
            --gate-path "${CALIBRATED_GATE_PATH}" \
            --output-dir "${VARIANTS_DIR}" \
            --method-name "${METHOD_NAME}" \
            --iteration "${ITERATION}" \
            --gate-thresholds "${GATE_THRESHOLD_ARGS[@]}" \
            --opacity-mode "${OPACITY_MODE}"

      - name: Render trained 3DGS variants
        if: ${{ inputs.render_command_template != '' }}
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations

          import os
          import subprocess
          from pathlib import Path

          import pandas as pd

          template = os.environ["RENDER_COMMAND_TEMPLATE"].strip()
          manifest = pd.read_csv(os.environ["MANIFEST_PATH"])
          render_root = Path(os.environ["RENDER_OUTPUT_ROOT"])
          render_root.mkdir(parents=True, exist_ok=True)
          for row in manifest.to_dict(orient="records"):
              variant = str(row["variant"])
              output_dir = render_root / variant
              output_dir.mkdir(parents=True, exist_ok=True)
              command = template.format(
                  model_dir=row["model_dir"],
                  output_dir=output_dir,
                  scene_dir=os.environ["SCENE_DIR"],
                  variant=variant,
                  iteration=os.environ["ITERATION"],
                  point_cloud_path=row["point_cloud_path"],
              )
              print(f"::group::Render {variant}")
              print(command)
              subprocess.run(command, shell=True, check=True)
              print("::endgroup::")
          PY

      - name: Select render predictions root
        shell: bash
        run: |
          if [ -n "${RENDERED_PREDICTIONS_ROOT}" ]; then
            echo "PREDICTIONS_ROOT=${RENDERED_PREDICTIONS_ROOT}" >> "${GITHUB_ENV}"
            echo "EVALUATE_RENDERED_VARIANTS=true" >> "${GITHUB_ENV}"
          elif [ -n "${RENDER_COMMAND_TEMPLATE}" ]; then
            echo "PREDICTIONS_ROOT=${RENDER_OUTPUT_ROOT}" >> "${GITHUB_ENV}"
            echo "EVALUATE_RENDERED_VARIANTS=true" >> "${GITHUB_ENV}"
          else
            echo "EVALUATE_RENDERED_VARIANTS=false" >> "${GITHUB_ENV}"
          fi

      - name: Map standard 3DGS render names to prepared scene
        if: ${{ inputs.render_name_map_path != '' }}
        shell: bash
        run: |
          if [ "${EVALUATE_RENDERED_VARIANTS}" != "true" ]; then
            echo "No render outputs were selected; skipping render-name mapping."
            exit 0
          fi
          python - <<'PY' >> "${GITHUB_ENV}"
          from __future__ import annotations

          import os
          from pathlib import Path

          import pandas as pd

          from gpis_splatting.colmap_render_mapping import map_3dgs_renders_to_prepared_scene
          from gpis_splatting.external_3dgs import resolve_3dgs_variant_prediction_dir

          scene_dir = Path(os.environ["SCENE_DIR"])
          raw_map_path = Path(os.environ["RENDER_NAME_MAP_PATH"])
          map_path = raw_map_path if raw_map_path.is_absolute() else raw_map_path
          if not map_path.exists():
              map_path = scene_dir / raw_map_path
          if not map_path.is_file():
              raise SystemExit(f"Render-name map does not exist: {map_path}")

          manifest = pd.read_csv(os.environ["MANIFEST_PATH"])
          predictions_base = Path(os.environ["PREDICTIONS_ROOT"])
          method_name = os.environ["METHOD_NAME"]
          prediction_subdir = os.environ["PREDICTION_SUBDIR"]
          mapped_root = scene_dir / "renders" / f"{method_name}_mapped_variants"
          mapped_root.mkdir(parents=True, exist_ok=True)

          for row in manifest.itertuples(index=False):
              variant = str(row.variant)
              raw_dir = resolve_3dgs_variant_prediction_dir(
                  predictions_base,
                  manifest_row=row,
                  method_name=method_name,
                  prediction_subdir=prediction_subdir,
              )
              if raw_dir is None:
                  raise SystemExit(f"Could not find rendered prediction directory for variant {variant!r} under {predictions_base}")
              map_3dgs_renders_to_prepared_scene(
                  map_path=map_path,
                  renders_dir=raw_dir,
                  output_dir=mapped_root / variant,
                  link_mode=os.environ["RENDER_MAPPING_LINK_MODE"],
                  require_all=os.environ["REQUIRE_ALL_IMAGES"].lower() == "true",
                  overwrite=True,
              )

          print(f"PREDICTIONS_ROOT={mapped_root}")
          print("PREDICTION_SUBDIR=")
          print(f"MAPPED_RENDER_NAME_MAP_PATH={map_path}")
          PY

      - name: Evaluate trained 3DGS variant renders
        shell: bash
        run: |
          if [ "${EVALUATE_RENDERED_VARIANTS}" != "true" ]; then
            echo "No render command or rendered_predictions_root was provided; skipping render metric evaluation."
            exit 0
          fi
          ARGS=(
            --manifest-path "${MANIFEST_PATH}"
            --scene-dir "${SCENE_DIR}"
            --predictions-root "${PREDICTIONS_ROOT}"
            --output-dir "${EVALUATIONS_DIR}"
            --method-name "${METHOD_NAME}"
            --split "${RENDER_SPLIT}"
            --prediction-subdir "${PREDICTION_SUBDIR}"
            --compute-lpips "${COMPUTE_LPIPS}"
            --require-all-images "${REQUIRE_ALL_IMAGES}"
          )
          if [ -n "${BENCHMARK_TARGET}" ]; then
            ARGS+=(--benchmark-target "${BENCHMARK_TARGET}")
          fi
          python -m gpis_splatting.cli.evaluate_3dgs_variant_renders "${ARGS[@]}"

      - name: Publish workflow summary
        if: always()
        shell: bash
        run: |
          {
            echo "# Trained 3DGS photometric evaluation"
            echo
            echo "- Prepared scene: \`${PREPARED_SCENE}\`"
            echo "- Prepared scene artifact: \`${PREPARED_SCENE_ARTIFACT_NAME:-none}\`"
            echo "- Prepared scene artifact run: \`${PREPARED_SCENE_ARTIFACT_RUN_ID:-none}\`"
            echo "- Trained model artifact: \`${TRAINED_MODEL_ARTIFACT_NAME:-none}\`"
            echo "- Trained model artifact run: \`${TRAINED_MODEL_ARTIFACT_RUN_ID:-none}\`"
            echo "- Trained PLY: \`${TRAINED_PLY_PATH}\`"
            echo "- Manifest: \`${MANIFEST_PATH}\`"
            echo "- Calibrated gate: \`${CALIBRATED_GATE_PATH}\`"
            echo "- Missing gate value: \`${MISSING_GATE_VALUE}\`"
            echo "- Render evaluation enabled: \`${EVALUATE_RENDERED_VARIANTS:-false}\`"
            echo "- Render-name map: \`${MAPPED_RENDER_NAME_MAP_PATH:-${RENDER_NAME_MAP_PATH:-none}}\`"
            if [ -f "${EVALUATIONS_DIR}/${METHOD_NAME}_3dgs_render_evaluation_report.md" ]; then
              echo
              cat "${EVALUATIONS_DIR}/${METHOD_NAME}_3dgs_render_evaluation_report.md"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload trained 3DGS evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trained-3dgs-photometric-${{ env.PREPARED_SCENE }}-${{ env.METHOD_NAME }}
          path: |
            real_scenes/${{ env.PREPARED_SCENE }}/${{ env.METHOD_NAME }}_splats.json
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_gpis_field_scores.csv
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_gpis_field_score_summary.csv
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_gpis_field_score_ranked.csv
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_gpis_field_score_status.json
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_gpis_field_score_report.md
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_calibrated_splat_scores.csv
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_calibrated_calibration_summary.csv
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_calibrated_calibration_ranked.csv
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_calibrated_calibration_status.json
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_calibrated_calibration_report.md
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_calibrated_confidence.npz
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_calibrated_gate_*.npz
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_3dgs_render_*.csv
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_3dgs_render_*.json
            real_scenes/${{ env.PREPARED_SCENE }}/evaluations/${{ env.METHOD_NAME }}_3dgs_render_*.md
            real_scenes/${{ env.PREPARED_SCENE }}/renders/${{ env.METHOD_NAME }}_mapped_variants/**/mapped_render_images*.csv
            real_scenes/${{ env.PREPARED_SCENE }}/renders/${{ env.METHOD_NAME }}_mapped_variants/**/mapped_render_images*.json
            real_scenes/${{ env.PREPARED_SCENE }}/renders/${{ env.METHOD_NAME }}_mapped_variants/**/mapped_render_images*.md
            real_scenes/${{ env.PREPARED_SCENE }}/trained_3dgs_variants/${{ env.METHOD_NAME }}/${{ env.METHOD_NAME }}_3dgs_variant_manifest.csv
            real_scenes/${{ env.PREPARED_SCENE }}/trained_3dgs_variants/${{ env.METHOD_NAME }}/${{ env.METHOD_NAME }}_3dgs_variant_status.json
            real_scenes/${{ env.PREPARED_SCENE }}/trained_3dgs_variants/${{ env.METHOD_NAME }}/${{ env.METHOD_NAME }}_3dgs_variant_report.md
